<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Mobile-first adjustments */
    body { 
      background-color: #f8f9fa; 
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
    }

    /* Keeps original name, but made responsive instead of fixed 400px */
    .search-container { 
      width: 100%; 
      max-width: 450px; 
      background: white; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
    }

    /* Suggestions need to be relative to the input container for mobile */
    #suggestions { 
      position: absolute; 
      z-index: 1000; 
      width: 100%; 
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* Ensures buttons are easy to tap on a touchscreen */
    .btn {
      padding: 12px;
      font-weight: 600;
    }

    /* Modern Overlay style for mobile */
    #resultoverlay {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.7); 
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .result-card { 
      display: none; /* Controlled by your script */
      margin-top: 15px; 
    }

    .form-select-sm, .form-control {
      height: 45px; /* Better for thumb interaction */
    }
  </style>
</head>
<body>
  
  <div class="search-container">
    <div id="search-form">
      
      <div id="searchform">
        <h5 class="mb-1">Branch Linker</h5>
        
        <div id="db-status" class="small mb-3" style="display: none; color: #198754; font-weight: bold;">
          ● Connected to database
        </div>

        <div class="mb-3">
          <label class="small fw-bold">Bank</label>
          <select id="bankSelect" class="form-select">
            <option value="Al Rajhi Bank">Al Rajhi Bank</option>
            <option value="Al Inma Bank">Al Inma Bank</option>
          </select>
        </div>
      </div>

      <div class="mb-4" style="position: relative;">
        <label class="small fw-bold">Branch Name or Code</label>
        <input type="text" id="branchInput" class="form-control" autocomplete="off" placeholder="Search...">
        <ul id="suggestions" class="list-group small"></ul>
      </div>

      <button id="findBtn" class="btn btn-primary w-100">Find</button>
    </div>

    <div class="result-card">
      </div>

    <div id="resultoverlay">
        <div class="card mx-auto" style="width: 90%; max-width: 350px; border-radius: 15px;">
            <div class="card-body p-4">
                <h6 id="resBranch" class="text-primary fw-bold mb-2"></h6>
                <div id="resDetails" class="small text-muted mb-4"></div>

                <div class="d-grid gap-2">
                    <button id="copyBtn" class="btn btn-outline-primary btn-sm py-2">Copy Link</button>
                    <button id="closeOverlayBtn" class="btn btn-light btn-sm text-secondary mt-1">Close</button>
                </div>
            </div>
        </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
